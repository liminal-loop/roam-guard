name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate coverage report
        run: ./gradlew koverXmlReport koverHtmlReport koverVerify

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            domain/build/reports/kover/
            data/build/reports/kover/

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## Coverage Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for report in domain/build/reports/kover/report.xml data/build/reports/kover/report.xml; do
            if [ -f "$report" ]; then
              MODULE=$(echo "$report" | cut -d'/' -f1)
              COVERAGE=$(grep -oP 'line-rate="\K[^"]+' "$report" | head -1)
              PCT=$(python3 -c "print(f'{float($COVERAGE)*100:.1f}%')" 2>/dev/null || echo "$COVERAGE")
              echo "- **$MODULE**: $PCT line coverage" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Module Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for report in domain/build/reports/kover/report.xml data/build/reports/kover/report.xml; do
            if [ -f "$report" ]; then
              MODULE=$(echo "$report" | cut -d'/' -f1)
              COVERAGE=$(grep -oP 'line-rate="\K[^"]+' "$report" | head -1)
              PCT=$(python3 -c "print(f'{float($COVERAGE)*100:.1f}%')" 2>/dev/null || echo "$COVERAGE")
              echo "| \`$MODULE\` | $PCT |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/
