name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Build project
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate coverage report
        run: ./gradlew koverXmlReport koverHtmlReport koverVerify

      - name: Generate Unit Coverage Summary
        if: always()
        run: |
          echo "## Unit Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Line Coverage | Branch Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for report in domain/build/reports/kover/report.xml data/build/reports/kover/report.xml; do
            if [ -f "$report" ]; then
              MODULE=$(echo "$report" | cut -d'/' -f1)
              LINE_RATE=$(python3 -c "import xml.etree.ElementTree as ET; t=ET.parse('$report'); r=t.getroot(); print(f'{float(r.get(\"line-rate\",0))*100:.1f}%')" 2>/dev/null)
              BRANCH_RATE=$(python3 -c "import xml.etree.ElementTree as ET; t=ET.parse('$report'); r=t.getroot(); print(f'{float(r.get(\"branch-rate\",0))*100:.1f}%')" 2>/dev/null || echo "N/A")
              echo "| \`$MODULE\` | $LINE_RATE | $BRANCH_RATE |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            **/build/reports/kover/

      - name: Generate License Report
        run: python3 scripts/check-licenses.py

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: build/reports/licenses/

      - name: Generate SBOM
        run: python3 scripts/generate-sbom.py

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: app/build/reports/bom.json

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/
