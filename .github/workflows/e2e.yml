name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK with coverage
        run: ./gradlew :app:assembleDebug

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: e2e-test
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: ./gradlew :e2e-tests:connectedCheck

      - name: Generate CTRF report
        if: always()
        run: |
          mkdir -p build/test-results
          python3 scripts/ctrf-converter.py \
            --input e2e-tests/build/outputs/androidTest-results/connected/ \
            --output build/test-results/ctrf-report.json

      - name: Publish CTRF report to summary
        if: always()
        run: |
          if [ -f build/test-results/ctrf-report.json ]; then
            echo "## E2E Test Results (CTRF)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 scripts/ctrf-summary.py \
              --input build/test-results/ctrf-report.json \
              --format summary >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Individual Test Results" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Status | Duration |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
            python3 scripts/ctrf-summary.py \
              --input build/test-results/ctrf-report.json \
              --format details >> $GITHUB_STEP_SUMMARY
          else
            echo "No CTRF report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctrf-report
          path: build/test-results/ctrf-report.json

      - name: Generate E2E JaCoCo Coverage Summary
        if: always()
        run: |
          COVERAGE_EC_SRC="e2e-tests/build/outputs/code-coverage/connected/coverage.ec"
          COVERAGE_EC_DST="app/build/outputs/code-coverage/connected/coverage.ec"
          COVERAGE_REPORT_XML="app/build/reports/coverage/androidTest/debug/report.xml"
          if [ -f "$COVERAGE_EC_SRC" ]; then
            echo "Found coverage.ec in e2e-tests module, copying to app module..."
            mkdir -p "$(dirname "$COVERAGE_EC_DST")"
            cp "$COVERAGE_EC_SRC" "$COVERAGE_EC_DST"
          fi
          if [ -f "$COVERAGE_EC_DST" ]; then
            # Generate report without re-running tests (createDebugCoverageReport depends on connectedDebug)
            ./gradlew :app:createDebugCoverageReport -x :app:connectedDebug 2>/dev/null || \
              ./gradlew :app:createDebugCoverageReport 2>/dev/null || true
          else
            echo "No E2E coverage data available" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "$COVERAGE_REPORT_XML" ]; then
            echo "## E2E JaCoCo Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            COVERAGE=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('$COVERAGE_REPORT_XML'); root = tree.getroot(); print(f'{float(root.get(\"line-rate\", \"0\"))*100:.1f}%')" 2>/dev/null || echo "N/A")
            echo "**App Module E2E Coverage:** $COVERAGE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: |
            app/build/reports/coverage/
            app/build/outputs/code-coverage/
            e2e-tests/build/outputs/code-coverage/

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/build/reports/
            e2e-tests/build/outputs/androidTest-results/
