name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK with coverage
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: e2e-test
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: ./gradlew :e2e-tests:connectedCheck

      - name: Generate CTRF report
        if: always()
        run: |
          mkdir -p build/test-results
          python3 scripts/ctrf-converter.py \
            --input e2e-tests/build/outputs/androidTest-results/connected/ \
            --output build/test-results/ctrf-report.json

      - name: Publish CTRF report to summary
        if: always()
        run: |
          if [ -f build/test-results/ctrf-report.json ]; then
            echo "## E2E Test Results (CTRF)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
import json
with open('build/test-results/ctrf-report.json') as f:
    data = json.load(f)
s = data['results']['summary']
print(f'**Total:** {s["tests"]} | **Passed:** {s["passed"]} | **Failed:** {s["failed"]} | **Skipped:** {s["skipped"]}')
print(f'**Duration:** {s["time"]["duration"]}ms')
print(f'**Suites:** {s["suites"]}')
PYEOF
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Individual Test Results" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Status | Duration |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
import json
with open('build/test-results/ctrf-report.json') as f:
    data = json.load(f)
for t in data['results']['tests']:
    icon = '✅' if t['status'] == 'passed' else '❌' if t['status'] == 'failed' else '⏭️'
    print(f'| {icon} {t["name"]} | {t["status"]} | {t["duration"]}ms |')
PYEOF
          else
            echo "No CTRF report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctrf-report
          path: build/test-results/ctrf-report.json

      - name: Generate E2E JaCoCo Coverage Summary
        if: always()
        run: |
          if [ -f app/build/outputs/code-coverage/connected/coverage.ec ]; then
            ./gradlew :app:createDebugCoverageReport
            echo "## E2E JaCoCo Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            COVERAGE=$(python3 -c "
import xml.etree.ElementTree as ET
tree = ET.parse('app/build/reports/coverage/androidTest/debug/report.xml')
root = tree.getroot()
line_rate = float(root.get('line-rate', '0'))
print(f'{line_rate*100:.1f}%')
" 2>/dev/null || echo "N/A")
            echo "**App Module E2E Coverage:** $COVERAGE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No E2E coverage data available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: |
            app/build/reports/coverage/
            app/build/outputs/code-coverage/

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/build/reports/
            e2e-tests/build/outputs/androidTest-results/
