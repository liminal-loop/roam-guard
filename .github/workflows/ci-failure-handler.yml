name: CI Failure Handler

on:
  workflow_run:
    workflows: ["Build & Test", "Lint"]
    types: [completed]
    branches: ["**"]

permissions:
  actions: read
  pull-requests: write

jobs:
  handle-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Notify agent of CI failure
        uses: actions/github-script@v7
        env:
          AGENT_USERNAMES: opencode[bot],opencode-agent[bot]
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;
            const headBranch = run.head_branch;
            const headSha = run.head_sha;

            // Collect PR numbers from the payload or look them up via the API
            const prs = run.pull_requests || [];
            let prNumbers = prs.map(pr => pr.number);

            if (prNumbers.length === 0) {
              core.info(`No PRs in payload, searching for open PRs with head "${headBranch}"`);
              const { data: branchPrs } = await github.rest.pulls.list({
                owner, repo, state: 'open', head: `${owner}:${headBranch}`
              });
              // Filter by SHA match as a safeguard
              prNumbers = branchPrs
                .filter(pr => pr.head.sha === headSha)
                .map(pr => pr.number);
            }

            if (prNumbers.length === 0) {
              core.info(`No associated PRs found for branch "${headBranch}" @ ${headSha}`);
              return;
            }

            const agentUsernames = (process.env.AGENT_USERNAMES || 'opencode[bot]')
              .split(',')
              .map(s => s.trim());

            for (const num of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: num
              });
              const author = pr.user.login;
              if (agentUsernames.includes(author)) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: num,
                  body: `/opencode fix — CI workflow \`${run.name}\` failed.`
                });
                core.notice(`Commented /opencode fix on PR #${num} by @${author}`);
              } else {
                core.info(`PR #${num} author @${author} is not in agent usernames list, skipping`);
              }
            }
